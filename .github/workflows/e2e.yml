# E2E Playwright : stack complete en CI (Supabase local migre + Next build prod).
#
# Couvre les 4 suites e2e/ dont le flux critique facturation
# (brouillon -> emission gapless -> PDF). Odoo/Resend/Sentry : absents de
# l'env -> client stub / emails sautes / Sentry off (comportement prevu par
# lib/env.ts et createOdooClient). Le compte admin de test est cree par
# scripts/e2e-bootstrap.ts (refuse toute URL non locale).

name: E2E Playwright

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'types/**'
      - 'e2e/**'
      - 'proxy.ts'
      - 'supabase/migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'types/**'
      - 'e2e/**'
      - 'proxy.ts'
      - 'supabase/migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - '.github/workflows/e2e.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (Supabase local + Next prod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Compte de test cree sur l'instance LOCALE uniquement (garde-fou dans
      # le script de bootstrap). Pas un secret : ne touche jamais la prod.
      E2E_ADMIN_EMAIL: ci-admin@e2e.test
      E2E_ADMIN_PASSWORD: E2e-ci-Pass-2026!
      # Requis par lib/env.ts en build/runtime prod ; valeurs de test.
      ENCRYPTION_KEY: e2e-ci-encryption-key-0000000000000000
      CRON_SECRET: e2e-ci-cron-secret-000000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Version epinglee : `latest` se resout via l'API GitHub anonyme qui
      # rate-limit (vecu) ; le token couvre les eventuels autres appels API.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          version: 2.105.0

      # Le seed demo a des FK qui exigent des users prealables : on l'ecarte,
      # les fixtures e2e dediees (e2e/fixtures.sql) suffisent.
      - name: Move seed away (fixtures dediees e2e)
        run: mv supabase/seed.sql supabase/seed.sql.bak

      - name: Start Supabase (migrations appliquees)
        run: supabase start --workdir . --ignore-health-check

      - name: Capture Supabase env
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Apply e2e fixtures
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 -f e2e/fixtures.sql

      - name: Bootstrap admin user
        run: npx tsx scripts/e2e-bootstrap.ts

      # Cache navigateurs : le telechargement CDN Playwright peut staller
      # APRES le 100% (vecu : extraction jamais finalisee, step mort au
      # timeout). Avec cache hit, la phase fragile est sautee entierement.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # `playwright install` hang sur ce runner APRES le telechargement (y
      # compris depuis un miroir 127.0.0.1 : c'est sa phase d'extraction qui
      # bloque, prouve par 4 runs). On le bypasse entierement : install-deps
      # pour les libs systeme (jamais bloque), puis curl + unzip + marker
      # INSTALLATION_COMPLETE dans le layout exact attendu (verifie sur une
      # install saine : <name>-<rev>/<contenu du zip> + marker vide).
      - name: Install Playwright browsers (curl + unzip, sans playwright install)
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          ./node_modules/.bin/playwright install-deps chromium

          ./node_modules/.bin/playwright install chromium --dry-run > /tmp/pw-dry.txt
          paste -d' ' \
            <(grep -E 'Install location:' /tmp/pw-dry.txt | awk '{print $3}') \
            <(grep -E 'Download url:' /tmp/pw-dry.txt | awk '{print $3}') \
            | sort -u > /tmp/pw-pairs.txt
          echo "composants :" && cat /tmp/pw-pairs.txt

          while read -r loc url; do
            if [ -f "$loc/INSTALLATION_COMPLETE" ]; then
              echo "deja present (cache) : $loc"
              continue
            fi
            zip="/tmp/$(basename "$url")"
            curl -fSL --retry 5 --retry-all-errors \
              --speed-limit 102400 --speed-time 30 -o "$zip" "$url"
            rm -rf "$loc" && mkdir -p "$loc"
            unzip -q "$zip" -d "$loc"
            touch "$loc/INSTALLATION_COMPLETE"
            echo "installe : $loc"
          done < /tmp/pw-pairs.txt

      - name: Build Next (prod)
        timeout-minutes: 10
        run: npm run build

      - name: Start Next
        run: |
          npm run start > /tmp/next-start.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3000/login && exit 0
            sleep 2
          done
          echo "Next server failed to start" >&2
          tail -50 /tmp/next-start.log >&2
          exit 1

      - name: Run Playwright suite
        timeout-minutes: 10
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: ./node_modules/.bin/playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Stop Supabase (cleanup)
        if: always()
        run: supabase stop || true
